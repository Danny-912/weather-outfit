<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather & Clothing Suggestion App</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
    
<body>
    <div class="container">
        <h1>Weather & Clothing Suggestion</h1>
        <div class="search">
            <input type="text" id="cityInput" placeholder="Enter city name...">
            <button id="searchBtn">Search</button>
        </div>
        <div id="recentSearches" class="recent-searches"></div>
        <div id="weatherResult" class="weather-result"></div>
        <div id="clothingSuggestion" class="clothing-suggestion"></div>
    </div>

    <script type="module" src="scripts/weatherApi.js"></script>
    <script type="module" src="scripts/clothingLogic.js"></script>
    <script type="module" src="scripts/ui.js"></script>
    <script type="module" src="scripts/main.js"></script>
</body>
</html>
